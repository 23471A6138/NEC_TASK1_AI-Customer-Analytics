<h2>Prediction History</h2>

<table border="1">
<tr>
    <th>ID</th>
    <th>Customer ID</th>
    <th>Age</th>
    <th>Income</th>
    <th>Score</th>
    <th>Prediction</th>
</tr>

{% for row in records %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
    <td>{{ row[5] }}</td>
</tr>
{% endfor %}

</table>
