<!DOCTYPE html>
<html>
<head>
    <title>Customer Recommendations</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body style="background:#f4f6f9;">

<div class="container mt-5">

    <div class="card shadow p-5">

        <h1 class="text-center mb-4">
            Customer Recommendations
        </h1>
        <div style="text-align:center; margin:20px 0;">
    <form method="POST" action="/recommendation">
        <input type="number"
               name="income"
               placeholder="Enter Customer Income"
               style="padding:10px;width:250px;border-radius:8px;border:1px solid #ccc;">

        <button type="submit"
                style="padding:10px 20px;background:#0d6efd;color:white;border:none;border-radius:8px;">
            Get Recommendation
        </button>
    </form>
    {% if recommendation %}
      <div class="alert alert-success mt-3">
    <h3>{{ recommendation }}</h3>
      </div>
      {% endif %}
      
         </div>

        <div class="alert alert-success">

            <h4>High Value Customers</h4>

            <p>
                Premium Product Offer
            </p>

        </div>

        <div class="alert alert-primary">

            <h4>Medium Value Customers</h4>

            <p>
                Combo Offers & Membership Plans
            </p>

        </div>

        <div class="alert alert-warning">

            <h4>Low Value Customers</h4>

            <p>
                Discount Coupons & Cashback Offers
            </p>

        </div>

        <hr>

        <div class="text-center">

            <a href="/dashboard"
               class="btn btn-primary">
                Back To Dashboard
            </a>

        </div>

  

</body>
</html>
